<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLN Thumbnail Creator</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Exportador de imagen -->
    <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <div id="preview">

        <img id="backgroundImage" src="">

        <div id="logo">
            <div class="logo-bln">
                BLN<sup class="logo-reg">®</sup>
            </div>
            <div class="logo-games">
                <div class="logo-shadow">GAMES</div>
                <div class="logo-text">GAMES</div>
            </div>
        </div>

        <div id="textBox">
            <div id="titleContainer"></div>
        </div>

    </div>

    <div class="controls">
        
        <input type="range" id="boxWidthSlider" min="20" max="90" value="36">

        <input type="file" id="imageInput" accept="image/*">

        <textarea id="titleInput">PRIMEROS
MINUTOS DE
GAMEPLAY</textarea>

        <div class="colorPanel">

            

            <div class="modeSelector">

                <button id="singleMode" class="modeBtn active">
                    Un color
                </button>

                <button id="doubleMode" class="modeBtn">
                    Dos colores
                </button>

            </div>

            <div id="singleColorBox">

                <label>Color</label>

                <input type="range" id="darknessSlider" min="0" max="60" value="20">

                <input
                    type="color"
                    id="colorPicker"
                    value="#ff0000">

            </div>

            <div id="doubleColorBox" style="display:none;">

                <label>Superior</label>

                <input
                    type="color"
                    id="topColorPicker"
                    value="#ff0000">

                <label>Inferior</label>

                <input
                    type="color"
                    id="bottomColorPicker"
                    value="#b30000">

            </div>

        </div>

        <button id="exportBtn">Exportar PNG</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
